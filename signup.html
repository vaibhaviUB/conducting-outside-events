<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - College Events Portal</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      background: linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1499750310107-5fef28a66643') no-repeat center center fixed;
      background-size: cover;
    }
    header {
      background: rgba(0,0,0,0.7);
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
      letter-spacing: 1px;
    }
    .container {
      max-width: 420px;
      margin: 80px auto;
      padding: 30px;
      background: rgba(0,0,0,0.75);
      border-radius: 12px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.5);
    }
    .container h2 {
      margin-bottom: 20px;
      color: #4CAF50;
      text-align: center;
    }
    .container form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .container input {
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    .container input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 4px rgba(76,175,80,0.12);
    }
    .container button {
      padding: 14px 18px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .container button:hover {
      background: #3e8e41;
    }
    .container .secondary {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
    }
    .container .secondary a {
      color: #4CAF50;
      text-decoration: none;
    }
    .container .secondary a:hover {
      text-decoration: underline;
    }
    .back-link {
      display: block;
      margin-top: 10px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
    }
    .back-link:hover {
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <header>
    <h1>College Events Portal</h1>
  </header>
  <div class="container">
    <h2>Create a Student Account</h2>
    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <p class="secondary">Already registered? <a href="login.html">Login here</a></p>
    <a class="back-link" href="index.html">Back to Home</a>
  </div>
</body>
</html>
